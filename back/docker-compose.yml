services:
  db:
    image: postgres:16
    container_name: practico_final_ds
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    env_file:
      - .env
    ports:
      - 80:80

volumes:
  db: