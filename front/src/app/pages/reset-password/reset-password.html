<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="d-flex align-items-center text-center gap-3 mb-4">
                    <i class="bi bi-shield-lock-fill text-primary fs-2"></i>
                    <h3 class="mt-2 fw-bold" style="font-size: 1.5rem;">Actualizar contraseña</h3>
                </div>
            
                <form (ngSubmit)="submit()" #form="ngForm">

                    <div class="mb-3">
                        <label for="password" class="form-label fw-medium">Contraseña (mín. 8 caracteres)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input id="password" [type]="showPassword() ? 'text' : 'password'" class="form-control" [(ngModel)]="password" name="password" required minlength="8" placeholder="••••••••" />
                            <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()">
                                <i [class]="showPassword() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label fw-medium">Confirmar contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input id="confirmPassword" [type]="showConfirmPassword() ? 'text' : 'password'" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder="••••••••" />
                            <button class="btn btn-outline-secondary" type="button" (click)="toggleConfirmPassword()">
                                <i [class]="showConfirmPassword() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || loading()">
                        @if (loading()) {
                            <span class="spinner-border spinner-border-sm me-1" role="status"></span>
                        }
                        Confirmar Contraseña
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
