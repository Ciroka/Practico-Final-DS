<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="d-flex align-items-center text-center gap-3 mb-4">
                    <i class="bi bi-shield-lock-fill text-primary fs-2"></i>
                    <h3 class="mt-2 fw-bold" style="font-size: 1.5rem;">Actualizar contraseña</h3>
                </div>

                @if (error) {
                <div class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    {{ error }}
                </div>
                }
            
                <form (ngSubmit)="submit()" #form="ngForm">

                    <div class="mb-3">
                        <label for="password" class="form-label fw-medium">Contraseña (mín. 8 caracteres)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input id="password" type="password" class="form-control" [(ngModel)]="password"
                                name="password" required minlength="8" placeholder="••••••••" />
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label fw-medium">Confirmar contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input id="confirmPassword" type="password" class="form-control"
                                [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder="••••••••" />
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || loading()">
                        @if (loading()) {
                        <span class="spinner-border spinner-border-sm me-1" role="status"></span>
                        }
                        Confirmar Contraseña
                    </button>
                </form>
                @if(message){
                <div class="alert alert-success mb-3 d-flex align-items-center" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <div>{{ message.message }}</div>
                </div>
                }
            </div>
        </div>
    </div>
</div>
