<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">

        @if(status() && loading()){
        <div>
          <i class="bi bi-check-circle display-5" style="color: var(--success)"></i>
          <h3 class="mt-3 fw-bold">{{message.message}}</h3>
          <a class="btn btn-primary w-100 mt-3" routerLink="/login">Iniciar sesión</a>
        </div>
        }@else if (!status() && !loading()){
        <div>
          <i class="bi bi-x-circle display-5" style="color: var(--danger)"></i>
          <h3 class="mt-3 fw-bold">{{message.message}}</h3>
          <a class="btn btn-outline-primary w-100 mt-2" routerLink="/login">Ir al login</a>
        </div>
        }
      </div>
    </div>
  </div>
</div>
