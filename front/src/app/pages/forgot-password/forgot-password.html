<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
            <i class="bi bi-envelope" style="color: var(--primary)"></i>
            
          <h3 class="mt-2 fw-bold">Actualizar la contraseña</h3>
        </div>
        <form>
            <div class="mb-4">
            <label for="email" class="form-label fw-medium">Te enviaremos un email con instrucciones para restablecer tu contraseña</label>
            <div class="input-group">
              <input
                id="email"
                type="email"
                class="form-control"
                name="email"
                required="true"
                placeholder="Ingrese su email"
              />
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
           Enviar email
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
