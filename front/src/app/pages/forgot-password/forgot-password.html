<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-envelope" style="color: var(--primary)"></i>
          <h3 class="mt-2 fw-bold">Actualizar la contraseña</h3>
        </div>

        <input type="checkbox" id="sent" style="display: none;">

        <form #form="ngForm" (ngSubmit)="sendEmail()">
          <div class="mb-4">
            <label for="email" class="form-label fw-medium">
              Te enviaremos un email con instrucciones para restablecer tu contraseña
            </label>
            <input
              id="email"
              type="email"
              class="form-control"
              [(ngModel)]="email"
              name="email"
              required
              email
              placeholder="ejemplo@correo.com"
            />
          </div>

          @if (message()) {
            <div class="alert alert-success mb-3 d-flex align-items-center" role="alert">
              <i class="bi bi-check-circle-fill me-2"></i>
              <div>{{ message()?.message }}</div>
            </div>
          }

          <button type="submit" class="btn btn-primary w-100"  [disabled]="form.invalid || !canResend">
            @if (canResend){
              Enviar link
            }@else {
              Reenviar en {{ secondsLeft() }}s
            } 
          </button>
        </form>

      </div>
    </div>
  </div>
</div>
