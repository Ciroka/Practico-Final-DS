<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">

        <div class="text-center mb-4">
          <i class="bi bi-key-fill display-5" style="color: var(--primary)"></i>
          <h3 class="mt-2 fw-bold">Cambiar contraseña</h3>
        </div>

        <form (ngSubmit)="submit()" #form="ngForm">

          <div class="mb-3">
            <label for="currentPassword" class="form-label fw-medium">Contraseña actual</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                id="currentPassword"
                [type]="showPassword() ? 'text' : 'password'"
                class="form-control"
                [(ngModel)]="currentPassword"
                name="currentPassword"
                required
                placeholder="••••••••"
              />
              <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()">
                <i [class]="showPassword() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </button>
            </div>
          </div>

          <div class="mb-3">
            <label for="newPassword" class="form-label fw-medium">Nueva contraseña (mín. 8 caracteres)</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                id="newPassword"
                [type]="showNewPassword() ? 'text': 'password'"
                class="form-control"
                [(ngModel)]="newPassword"
                name="newPassword"
                required
                minlength="8"
                placeholder="••••••••"
              />
              <button class="btn btn-outline-secondary" type="button" (click)="toggleNewPassword()">
                <i [class]="showNewPassword() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </button>
            </div>
          </div>

          <div class="mb-4">
            <label for="confirmPassword" class="form-label fw-medium">Confirmar nueva contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                id="confirmPassword"
                [type]="showNewConfirmPassword() ? 'text': 'password'"
                class="form-control"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                required
                placeholder="••••••••"
              />
              <button class="btn btn-outline-secondary" type="button" (click)="toggleNewConfirmPassword()">
                <i [class]="showNewConfirmPassword() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || loading()">
            @if (loading()) {
              <span class="spinner-border spinner-border-sm me-1" role="status"></span>
            }
            Confirmar
          </button>

        </form>

        <p class="mt-3 text-center text-muted mb-0">
          <a routerLink="/profile">Volver al perfil</a>
        </p>

      </div>
    </div>
  </div>
</div>
