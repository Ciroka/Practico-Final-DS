<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">

        <div class="text-center mb-4">
          <i class="bi bi-person-x-fill display-5 text-danger"></i>
          <h3 class="mt-2 fw-bold">Eliminar cuenta</h3>
          <p class="text-muted" style="font-size: .875rem;">
            Esta acción es permanente e irreversible. Ingresá tu contraseña para confirmar.
          </p>
        </div>

        <form (ngSubmit)="submit()" #form="ngForm">

          <div class="mb-4">
            <label for="password" class="form-label fw-medium">Contraseña actual</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                id="password"
                [type]="showPassword() ? 'text' : 'password'"
                class="form-control"
                [(ngModel)]="password"
                name="password"
                required
                placeholder="••••••••"
              />
              <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()">
                <i [class]="showPassword() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-danger w-100" [disabled]="form.invalid || loading()">
            @if (loading()) {
              <span class="spinner-border spinner-border-sm me-1" role="status"></span>
            }
            Eliminar cuenta
          </button>

        </form>

        <p class="mt-3 text-center text-muted mb-0">
          <a routerLink="/profile">Volver al perfil</a>
        </p>

      </div>
    </div>
  </div>
</div>
