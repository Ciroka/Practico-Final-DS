<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <i class="bi bi-envelope-check display-5" style="color: var(--primary)"></i>
        <h3 class="mt-3 fw-bold">Revisá tu email</h3>
        <p class="text-muted mt-2">Te enviamos un link de verificación.</p>
        <button class="btn btn-outline-primary w-100 mt-3" (click)="resend()" [disabled]="!canResend">
          @if (canResend) {
          Reenviar email
          } @else {
          Reenviar en {{ secondsLeft() }}s
          }
        </button>
      </div>
    </div>
  </div>
</div>
